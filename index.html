<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background:
                radial-gradient(circle at top left, #3b82f6 0%, transparent 30%),
                radial-gradient(circle at bottom right, #8b5cf6 0%, transparent 30%),
                #0f172a;
            padding: 30px 0;
        }

        .container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .card {
            width: 900px;
            max-width: 95%;
            display: flex;
            align-items: center;
            gap: 18px;

            padding: 15px;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);

            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;

            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);

            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
        }

        .image {
            position: relative;
            flex-shrink: 0;
        }

        .image img {
            width: 250px;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
            display: block;
        }

        .image .capsule {
            position: absolute;
            right: 8px;
            bottom: 8px;

            background: rgba(0, 0, 0, 0.85);
            color: white;

            padding: 4px 8px;
            border-radius: 5px;

            font-size: 12px;
            font-weight: 600;
        }

        .text {
            flex: 1;
        }

        .text h1 {
            color: white;
            font-size: 1.4rem;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .text p {
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        .card:hover {
            transform: translateY(-4px);

            border: 1px solid rgba(255, 255, 255, 0.35);

            box-shadow:
                0 0 15px rgba(255, 255, 255, 0.15),
                0 0 30px rgba(255, 255, 255, 0.10),
                0 0 45px rgba(255, 255, 255, 0.05);

            background: rgba(255, 255, 255, 0.12);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="image">
                <img src="https://i.ytimg.com/vi/3LRZRSIh_KE/hq720.jpg?sqp=-%E2%80%A6BACGAY4AUAB&rs=AOn4CLAfEvew-k6Bn7XD6uWOvvPRNqU4RA"
                    alt="React Thumbnails">
                <div class="capsule">31:06</div>
            </div>
            <div class="text">
                <h1>Introduction to Backend | Sigma Web Dev video #2</h1>
                <p>CodeWithHarry . 727K views . 2 months ago</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
